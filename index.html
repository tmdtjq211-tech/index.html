<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>음식 라이어 게임</title>
    <!-- 서버 없이 P2P 연결을 도와주는 PeerJS 라이브러리 -->
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; }
        body { background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #333; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        button { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background-color: #ff6b6b; color: white; }
        .btn-primary:hover { background-color: #ff5252; }
        .btn-secondary { background-color: #4ecdc4; color: white; }
        .btn-secondary:hover { background-color: #45b7d1; }
        .screen { display: none; }
        .active { display: block; }
        ul { list-style: none; padding: 0; text-align: left; }
        li { background: #eee; margin: 5px 0; padding: 10px; border-radius: 6px; display: flex; justify-content: space-between; }
        .status-ready { color: #ff6b6b; font-weight: bold; }
        .role-box { padding: 20px; border-radius: 8px; margin: 20px 0; font-size: 24px; font-weight: bold; }
        .role-liar { background: #333; color: red; }
        .role-citizen { background: #e9ecef; color: #333; }
        #room-id-display { font-size: 24px; letter-spacing: 2px; color: #ff6b6b; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <!-- 화면 1: 닉네임 설정 및 방 선택 -->
    <div id="screen-intro" class="screen active">
        <h1>🍕 음식 라이어 게임</h1>
        <p>서버 없이 즐기는 눈치 게임!</p>
        <input type="text" id="nickname" placeholder="내 닉네임 입력">
        <button class="btn-primary" onclick="createRoom()">방 만들기 (방장)</button>
        <button class="btn-secondary" onclick="showJoinScreen()">방 참여하기 (팀원)</button>
    </div>

    <!-- 화면 2: 방 참여하기 폼 -->
    <div id="screen-join" class="screen">
        <h1>방 참여하기</h1>
        <input type="text" id="room-code-input" placeholder="방장이 알려준 코드 입력">
        <button class="btn-secondary" onclick="joinRoom()">입장하기</button>
        <button onclick="showScreen('screen-intro')">뒤로 가기</button>
    </div>

    <!-- 화면 3: 로비 (음식 입력 및 대기) -->
    <div id="screen-lobby" class="screen">
        <h2>대기실</h2>
        <p id="room-code-container" style="display:none;">방 코드: <span id="room-id-display"></span></p>
        
        <input type="text" id="food-input" placeholder="생각나는 음식 하나 적기!">
        <button class="btn-secondary" onclick="submitFood()">제출완료</button>

        <h3>참가자 목록</h3>
        <ul id="player-list"></ul>
        
        <button id="btn-start" class="btn-primary" style="display:none;" onclick="startGame()">게임 시작 (방장 전용)</button>
    </div>

    <!-- 화면 4: 게임 결과 (라이어 / 시민 확인) -->
    <div id="screen-game" class="screen">
        <h2>게임 결과</h2>
        <div id="role-display" class="role-box"></div>
        <button onclick="resetLobby()">다시 대기실로</button>
    </div>
</div>

<script>
    let peer;
    let conn;
    let isHost = false;
    let myName = "";
    let myId = "";
    
    // 방장 전용 데이터 관리
    let connections = [];
    let players = []; // { id, name, food }

    function getNickname() {
        const name = document.getElementById('nickname').value.trim();
        if (!name) { alert("닉네임을 입력해주세요!"); return null; }
        return name;
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function showJoinScreen() {
        if (getNickname()) showScreen('screen-join');
    }

    // 1. 방장: 방 만들기
    function createRoom() {
        myName = getNickname();
        if (!myName) return;

        peer = new Peer(); // 랜덤 ID 생성
        peer.on('open', (id) => {
            myId = id;
            isHost = true;
            players.push({ id: myId, name: myName, food: "" });
            
            document.getElementById('room-id-display').innerText = id;
            document.getElementById('room-code-container').style.display = 'block';
            document.getElementById('btn-start').style.display = 'block';
            
            updatePlayerListUI();
            showScreen('screen-lobby');
        });

        peer.on('connection', (connection) => {
            connections.push(connection);
            connection.on('data', (data) => handleClientData(connection.peer, data));
        });
    }

    // 2. 팀원: 방 참여하기
    function joinRoom() {
        myName = getNickname();
        const roomCode = document.getElementById('room-code-input').value.trim();
        if (!myName || !roomCode) return;

        peer = new Peer();
        peer.on('open', (id) => {
            myId = id;
            conn = peer.connect(roomCode);
            conn.on('open', () => {
                conn.send({ type: 'JOIN', name: myName });
                showScreen('screen-lobby');
            });
            conn.on('data', (data) => handleHostData(data));
        });
    }

    // [방장] 클라이언트로부터 데이터 받기
    function handleClientData(peerId, data) {
        if (data.type === 'JOIN') {
            players.push({ id: peerId, name: data.name, food: "" });
            broadcastSync();
        } else if (data.type === 'FOOD') {
            const player = players.find(p => p.id === peerId);
            if (player) player.food = data.value;
            broadcastSync();
        }
    }

    // [팀원] 방장으로부터 데이터 받기
    function handleHostData(data) {
        if (data.type === 'SYNC') {
            players = data.players;
            updatePlayerListUI();
        } else if (data.type === 'START') {
            showGameResult(data.role, data.word);
        }
    }

    // [방장] 현재 상태를 모든 팀원에게 전송
    function broadcastSync() {
        updatePlayerListUI();
        connections.forEach(c => c.send({ type: 'SYNC', players: players }));
    }

    // 3. 음식 제출
    function submitFood() {
        const foodValue = document.getElementById('food-input').value.trim();
        if (!foodValue) { alert("음식을 입력해주세요!"); return; }

        if (isHost) {
            const player = players.find(p => p.id === myId);
            if (player) player.food = foodValue;
            broadcastSync();
        } else {
            conn.send({ type: 'FOOD', value: foodValue });
        }
        alert("음식이 제출되었습니다. 다른 사람들을 기다려주세요.");
    }

    // 4. UI: 참가자 목록 업데이트
    function updatePlayerListUI() {
        const list = document.getElementById('player-list');
        list.innerHTML = "";
        players.forEach(p => {
            const li = document.createElement('li');
            li.innerHTML = `<span>${p.name}</span> <span class="status-ready">${p.food ? '제출 완료 🍔' : '고민 중... 🤔'}</span>`;
            list.appendChild(li);
        });
    }

    // 5. [방장] 게임 시작 및 라이어 선정 로직
    function startGame() {
        const submittedFoods = players.map(p => p.food).filter(f => f !== "");
        if (submittedFoods.length < players.length) {
            alert("아직 모든 사람이 음식을 제출하지 않았습니다!");
            return;
        }
        if (players.length < 2) {
            alert("최소 2명 이상이어야 게임이 가능합니다.");
            return;
        }

        // 제출된 음식 중 하나를 무작위로 제시어로 선택
        const targetFood = submittedFoods[Math.floor(Math.random() * submittedFoods.length)];
        
        // 무작위로 1명을 라이어로 선택
        const liarIndex = Math.floor(Math.random() * players.length);
        const liarId = players[liarIndex].id;

        // 각 플레이어에게 결과 전송
        players.forEach(p => {
            const isLiar = (p.id === liarId);
            const roleData = {
                type: 'START',
                role: isLiar ? 'liar' : 'citizen',
                word: isLiar ? '???' : targetFood
            };

            if (p.id === myId) { // 방장 본인
                showGameResult(roleData.role, roleData.word);
            } else { // 팀원들
                const clientConn = connections.find(c => c.peer === p.id);
                if (clientConn) clientConn.send(roleData);
            }
        });
    }

    // 6. 결과 화면 표시
    function showGameResult(role, word) {
        const display = document.getElementById('role-display');
        display.className = 'role-box ' + (role === 'liar' ? 'role-liar' : 'role-citizen');
        
        if (role === 'liar') {
            display.innerHTML = "당신은 <span style='color:red;'>라이어</span>입니다!<br><span style='font-size:16px; font-weight:normal; color:#ddd;'>다른 사람들의 설명을 듣고 눈치껏 정답을 맞히세요.</span>";
        } else {
            display.innerHTML = `제시어: <br><span style='color:#ff6b6b; font-size:36px;'>${word}</span><br><span style='font-size:16px; font-weight:normal; color:#666;'>라이어에게 들키지 않게 설명하세요.</span>`;
        }
        showScreen('screen-game');
    }

    // 7. 대기실로 돌아가기
    function resetLobby() {
        document.getElementById('food-input').value = "";
        if (isHost) {
            players.forEach(p => p.food = "");
            broadcastSync();
        }
        showScreen('screen-lobby');
    }
</script>

</body>
</html>
